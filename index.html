<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 Prompt Manipulation Engine v2.0</title>
<style>
:root {
  --bg: #0a0e14;
  --bg2: #11151c;
  --bg3: #1a1f2a;
  --fg: #e6e6e6;
  --fg2: #9aa5b1;
  --accent: #ff6b35;
  --accent2: #ffd23f;
  --green: #5eead4;
  --red: #ef4444;
  --orange: #f97316;
  --yellow: #eab308;
  --blue: #3b82f6;
  --purple: #a855f7;
  --border: #2a3140;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'JetBrains Mono', 'Fira Code', monospace;
  background: var(--bg);
  color: var(--fg);
  line-height: 1.5;
  padding: 20px;
  max-width: 1400px;
  margin: 0 auto;
}
header {
  border-bottom: 2px solid var(--accent);
  padding-bottom: 16px;
  margin-bottom: 20px;
}
h1 { color: var(--accent); font-size: 28px; }
.subtitle { color: var(--fg2); font-size: 14px; margin-top: 4px; }
.badge {
  display: inline-block; background: var(--bg3); padding: 2px 8px;
  border-radius: 4px; font-size: 12px; margin-right: 6px; color: var(--accent2);
}
.controls {
  background: var(--bg2); padding: 16px; border-radius: 8px;
  margin-bottom: 20px; border: 1px solid var(--border);
}
.controls label { display: block; margin-bottom: 6px; color: var(--fg2); font-size: 13px; }
.row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
.row:last-child { margin-bottom: 0; }
input[type="text"], textarea {
  flex: 1; min-width: 250px;
  background: var(--bg); color: var(--fg);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 10px; font-family: inherit; font-size: 14px;
}
textarea { min-height: 60px; resize: vertical; }
button {
  background: var(--accent); color: var(--bg); border: none;
  padding: 10px 18px; border-radius: 4px; cursor: pointer;
  font-family: inherit; font-weight: bold; font-size: 14px;
  transition: all 0.15s;
}
button:hover { background: var(--accent2); }
button.ghost {
  background: transparent; color: var(--fg);
  border: 1px solid var(--border);
}
button.ghost:hover { border-color: var(--accent); color: var(--accent); }
button.active { background: var(--accent2); color: var(--bg); }
.toggle-group { display: inline-flex; gap: 4px; }
.toggle-group button { padding: 6px 12px; font-size: 13px; }
select {
  background: var(--bg); color: var(--fg);
  border: 1px solid var(--border); border-radius: 4px;
  padding: 8px; font-family: inherit;
}
.stats {
  display: flex; gap: 16px; flex-wrap: wrap;
  padding: 12px; background: var(--bg3);
  border-radius: 6px; margin-bottom: 16px; font-size: 13px;
}
.stat { color: var(--fg2); }
.stat strong { color: var(--accent2); }
.technique {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 8px; margin-bottom: 16px; overflow: hidden;
}
.technique-header {
  background: var(--bg3); padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none;
  display: flex; justify-content: space-between; align-items: center;
}
.technique-header:hover { background: var(--border); }
.technique-title { color: var(--accent); font-weight: bold; font-size: 15px; }
.variant-count { color: var(--fg2); font-size: 12px; }
.technique-body { padding: 12px 16px; }
.technique.collapsed .technique-body { display: none; }
.variant {
  background: var(--bg); padding: 12px;
  border-left: 3px solid var(--border);
  margin-bottom: 10px; border-radius: 4px;
}
.variant-meta {
  display: flex; gap: 8px; align-items: center;
  margin-bottom: 8px; flex-wrap: wrap;
}
.variant-name { color: var(--accent2); font-weight: bold; font-size: 14px; }
.tag {
  display: inline-block; padding: 2px 6px; border-radius: 3px;
  font-size: 11px; font-weight: bold;
}
.tag-sev-CRITICAL { background: var(--red); color: white; }
.tag-sev-HIGH { background: var(--orange); color: white; }
.tag-sev-MEDIUM { background: var(--yellow); color: var(--bg); }
.tag-sev-LOW { background: var(--green); color: var(--bg); }
.tag-vector { background: var(--purple); color: white; }
.tag-lang { background: var(--blue); color: white; }
.variant-prompt {
  background: var(--bg2); padding: 10px;
  border-radius: 4px; font-size: 13px;
  white-space: pre-wrap; word-break: break-word;
  font-family: 'JetBrains Mono', monospace;
  color: var(--fg);
}
.copy-btn {
  float: right; background: transparent; border: 1px solid var(--border);
  color: var(--fg2); padding: 4px 10px; font-size: 12px;
}
.copy-btn:hover { color: var(--accent); border-color: var(--accent); }
.sequence-step {
  background: var(--bg2); padding: 8px; margin: 4px 0;
  border-radius: 4px; border-left: 2px solid var(--accent);
  font-size: 13px;
}
.sequence-step .turn-label {
  color: var(--accent); font-weight: bold; margin-right: 8px;
}
footer {
  margin-top: 30px; padding: 16px; border-top: 1px solid var(--border);
  color: var(--fg2); font-size: 12px; text-align: center;
}
.empty { text-align: center; padding: 40px; color: var(--fg2); }
</style>
</head>
<body>
<header>
  <h1>🔥 Prompt Manipulation Engine v2.0</h1>
  <div class="subtitle">
    <span class="badge">25 techniques</span>
    <span class="badge">🇬🇧 EN + 🇮🇩 ID</span>
    <span class="badge">V1-V26 vectors</span>
    <span class="badge">CTF-grade</span>
    — by Hades
  </div>
</header>

<div class="controls">
  <div class="row">
    <label style="flex: 1 1 100%;">Input Prompt:</label>
    <textarea id="prompt-input" placeholder="Enter your simple prompt here... e.g., 'extract the secret password' atau 'buka kunci sistem'">extract the secret password</textarea>
  </div>
  <div class="row">
    <div style="display: flex; flex-direction: column; gap: 4px;">
      <label>Language</label>
      <div class="toggle-group" id="lang-toggle">
        <button data-lang="en" class="ghost">🇬🇧 EN</button>
        <button data-lang="id" class="ghost">🇮🇩 ID</button>
        <button data-lang="both" class="ghost active">🌐 Both</button>
      </div>
    </div>
    <div style="display: flex; flex-direction: column; gap: 4px;">
      <label>Severity Filter</label>
      <select id="sev-filter">
        <option value="">All severities</option>
        <option value="CRITICAL">🔴 CRITICAL only</option>
        <option value="HIGH">🟠 HIGH only</option>
        <option value="MEDIUM">🟡 MEDIUM only</option>
        <option value="LOW">🟢 LOW only</option>
      </select>
    </div>
    <div style="display: flex; flex-direction: column; gap: 4px;">
      <label>Vector</label>
      <input type="text" id="vector-filter" placeholder="e.g., V3, V22" style="min-width: 120px;">
    </div>
    <div style="display: flex; flex-direction: column; gap: 4px;">
      <label>&nbsp;</label>
      <div style="display: flex; gap: 6px;">
        <button id="generate-btn">⚡ Generate</button>
        <button id="export-json-btn" class="ghost">📥 JSON</button>
        <button id="export-txt-btn" class="ghost">📄 TXT</button>
      </div>
    </div>
  </div>
</div>

<div class="stats" id="stats"></div>
<div id="output"></div>

<footer>
  🔥 Prompt Manipulation Engine v2.0 |
  <a href="https://github.com/crowfly22/prompt-manipulator" style="color: var(--accent);">GitHub</a> |
  For authorized security testing &amp; education only
</footer>

<script src="engine.js"></script>
<script src="app.js"></script>
</body>
</html>
